apiVersion: 1

apps:
  - type: 'aiworkshop-bcapi-app'
    org_id: 1
    org_name: 'aiworkshop'
    disabled: false
    jsonData:
      apiUrl: http://default-url.com
    secureJsonData:
      apiKey: secret-key

  - type: 'grafana-llm-app'
    org_id: 1
    org_name: 'aiworkshop'
    disabled: false
    jsonData:
      provider: "anthropic"
      anthropic:
        url: "https://cc-workshop-proxy.grafana.fun"
      models:
        default: base
        mapping:
          base: claude-sonnet-4-20250514
          large: claude-sonnet-4-20250514
    secureJsonData:
      anthropicKey: "${ANTHROPIC_API_KEY}"
